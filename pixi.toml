[workspace]
channels = ["conda-forge", "bioconda"]
name = "nandomer"
platforms = ["osx-arm64"]
version = "0.1.0"

[tasks]

[dependencies]
python = "3.11.*"
pysam = ">=0.23.3,<0.24"
pytest = ">=9.0.2,<10"
parasail-python = ">=1.3.4,<2"
tqdm = ">=4.67.1,<5"
samtools = ">=1.6,<2"

[pypi-dependencies]
# Install the local project so console scripts like `nandomer` are available via `pixi run`.
nandomer = { path = ".", editable = true }
